<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abhinandan | Portfolio</title>

<style>
:root {
    --bg: #f8fafc;
    --text: #0f172a;
    --card: #ffffff;
    --accent: #3b82f6;
}

body.dark {
    --bg: #0f172a;
    --text: #f1f5f9;
    --card: #1e293b;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
    transition: 0.3s;
}

body {
    background: var(--bg);
    color: var(--text);
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    padding: 15px 5%;
    background: var(--card);
    position: sticky;
    top: 0;
}

.nav-links a {
    margin-left: 15px;
    text-decoration: none;
    color: var(--text);
}

.toggle {
    cursor: pointer;
    font-size: 18px;
}

/* HERO */
.container {
    max-width: 1000px;
    margin: auto;
    padding: 20px;
}

h1 {
    font-size: 3rem;
}

.typing {
    color: var(--accent);
    font-weight: bold;
}

/* CARD */
.card {
    background: var(--card);
    padding: 20px;
    border-radius: 10px;
    margin-top: 20px;
    opacity: 0;
    transform: translateY(20px);
}

/* SHOW ANIMATION */
.show {
    opacity: 1;
    transform: translateY(0);
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}

/* TAG */
.tag {
    display: inline-block;
    padding: 5px 10px;
    background: #3b82f620;
    margin: 5px;
    border-radius: 20px;
}

@media(max-width:768px){
    .grid {
        grid-template-columns: 1fr;
    }
}
</style>
</head>

<body>

<nav class="navbar">
    <h2>ABHINANDAN</h2>
    <div>
        <span class="toggle" onclick="toggleDark()">🌙</span>
    </div>
</nav>

<div class="container">

<h1>Hi, I'm Abhinandan 👋</h1>
<p class="typing" id="typing"></p>

<section class="card">
    <h2>About Me</h2>
    <p>
        Computer Science student passionate about development, cybersecurity,
        and building real-world projects.
    </p>
</section>

<section class="card">
    <h2>Skills</h2>
    <span class="tag">Python</span>
    <span class="tag">C++</span>
    <span class="tag">SQL</span>
    <span class="tag">Java</span>
</section>

<section class="grid">
    <div class="card">
        <h3>Cyber Defensive Engine</h3>
        <p>Real-time threat detection system</p>
    </div>

    <div class="card">
        <h3>Vaccine Antivirus</h3>
        <p>Java-based antivirus system</p>
    </div>
</section>

</div>

<script>

/* DARK MODE */
function toggleDark() {
    document.body.classList.toggle("dark");
}

/* TYPING EFFECT */
const text = ["Software Developer", "Cybersecurity Enthusiast", "Problem Solver"];
let i = 0, j = 0;
let currentText = "";
let isDeleting = false;

function type() {
    currentText = text[i];
    
    if (!isDeleting) {
        document.getElementById("typing").innerHTML = currentText.substring(0, j++);
        if (j > currentText.length) {
            isDeleting = true;
            setTimeout(type, 1000);
            return;
        }
    } else {
        document.getElementById("typing").innerHTML = currentText.substring(0, j--);
        if (j < 0) {
            isDeleting = false;
            i = (i + 1) % text.length;
        }
    }

    setTimeout(type, isDeleting ? 50 : 100);
}

type();

/* SCROLL ANIMATION */
const cards = document.querySelectorAll(".card");

window.addEventListener("scroll", () => {
    cards.forEach(card => {
        const top = card.getBoundingClientRect().top;
        if (top < window.innerHeight - 50) {
            card.classList.add("show");
        }
    });
});

</script>

</body>
</html>
